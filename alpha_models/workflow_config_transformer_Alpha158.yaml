qlib_init:
    provider_uri: "~/Documents/quant/.data/qlib_data"
    region: cn
market: &market top_500_liquidity_stocks
benchmark: &benchmark SH000001
data_handler_config: &data_handler_config
    start_time: 2010-01-01
    end_time: 2026-03-19
    fit_start_time: 2010-01-01
    fit_end_time: 2025-12-31
    instruments: *market
    infer_processors:
        # - class: FilterCol
        #   kwargs:
        #       fields_group: feature
        #       col_list: ["RESI5", "WVMA5", "RSQR5", "KLEN", "RSQR10", "CORR5", "CORD5", "CORR10", 
        #                     "ROC60", "RESI10", "VSTD5", "RSQR60", "CORR60", "WVMA60", "STD5", 
        #                     "RSQR20", "CORD60", "CORD10", "CORR20", "KLOW"
        #                 ]
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    label: ["(Ref($close, -2)/Ref($close, -1) - 1 + Ref($close, -3)/Ref($close, -1) - 1 + Ref($close, -4)/Ref($close, -1) - 1 + Ref($close, -5)/Ref($close, -1) - 1 + Ref($close, -6)/Ref($close, -1) - 1) / 5"]

port_analysis_config: &port_analysis_config 
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 50
            n_drop: 5
    backtest:
        start_time: 2026-01-01
        end_time: 2026-02-28
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            # limit_threshold: 0.095
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: TransformerModel
        module_path: qlib.contrib.model.pytorch_transformer_ts
        kwargs:
            seed: 10059483
            n_jobs: 5
            batch_size: 4096
            d_feat: 158
            d_model: 128
            n_head: 8
            num_layers: 4
            dropout: 0.1

    dataset:
        class: TSDatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2010-01-01, 2025-12-31]
                valid: [2026-01-01, 2026-02-28]
                test: [2026-03-01, 2026-03-19]
            step_len: 20
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config
